name: Build apk

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Android keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Resolve app version from tag
        run: |
          RAW_TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RAW_TAG"
          : "${MAJOR:=0}"
          : "${MINOR:=0}"
          : "${PATCH:=0}"
          APP_VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "APP_VERSION_NAME=${RAW_TAG}" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=${APP_VERSION_CODE}" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          SIGNING_STORE_FILE: release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PAPP_VERSION_NAME="${APP_VERSION_NAME}" -PAPP_VERSION_CODE="${APP_VERSION_CODE}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
